name: main
on: [push, pull_request]

jobs:
  test-node:
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
        - 1025:1025  # SMTP port
        - 8025:8025  # Web interface port
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: "1"
          MP_SMTP_AUTH_ALLOW_INSECURE: "1"
        options: >-
          --health-cmd="wget --quiet --tries=1 --spider http://localhost:8025/api/v1/info"
          --health-interval=30s
          --health-timeout=10s
          --health-retries=3
          --health-start-period=40s
    env:
      MAILPIT_SMTP_HOST: localhost
      MAILPIT_SMTP_PORT: 1025
      MAILPIT_SMTP_SECURE: "false"
      MAILPIT_API_URL: http://localhost:8025
      STALWART_SESSION_URL: http://localhost:8080/jmap/session
      STALWART_USERNAME: test@mail.example.com
      STALWART_PASSWORD: password123
      STALWART_BASE_URL: http://localhost:8080
      MAILGUN_KEY: ${{ secrets.MAILGUN_KEY }}
      MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
      MAILGUN_TO: ${{ secrets.MAILGUN_TO }}
      MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
      MAILGUN_REGION: ${{ secrets.MAILGUN_REGION }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_TO: ${{ secrets.RESEND_TO }}
      RESEND_VERIFIED_DOMAIN: ${{ secrets.RESEND_VERIFIED_DOMAIN }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM: ${{ secrets.SENDGRID_FROM }}
      SENDGRID_TO: ${{ secrets.SENDGRID_TO }}
      LETTERMINT_API_TOKEN: ${{ secrets.LETTERMINT_API_TOKEN }}
      LETTERMINT_FROM: ${{ secrets.LETTERMINT_FROM }}
      LETTERMINT_TO: ${{ secrets.LETTERMINT_TO }}
      MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
      MAILEROO_FROM: ${{ secrets.MAILEROO_FROM }}
      MAILEROO_TO: ${{ secrets.MAILEROO_TO }}
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
      with:
        experimental: true
        cache: true
        cache_key_prefix: mise-v4
    - name: Start Stalwart
      run: docker compose -f packages/jmap/docker-compose.yml up -d
    - name: Setup Stalwart test accounts
      run: ./packages/jmap/scripts/setup-stalwart.sh
    - run: mise run test:node

  test-deno:
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
        - 1025:1025  # SMTP port
        - 8025:8025  # Web interface port
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: "1"
          MP_SMTP_AUTH_ALLOW_INSECURE: "1"
        options: >-
          --health-cmd="wget --quiet --tries=1 --spider http://localhost:8025/api/v1/info"
          --health-interval=30s
          --health-timeout=10s
          --health-retries=3
          --health-start-period=40s
    env:
      MAILPIT_SMTP_HOST: localhost
      MAILPIT_SMTP_PORT: 1025
      MAILPIT_SMTP_SECURE: "false"
      MAILPIT_API_URL: http://localhost:8025
      STALWART_SESSION_URL: http://localhost:8080/jmap/session
      STALWART_USERNAME: test@mail.example.com
      STALWART_PASSWORD: password123
      STALWART_BASE_URL: http://localhost:8080
      MAILGUN_KEY: ${{ secrets.MAILGUN_KEY }}
      MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
      MAILGUN_TO: ${{ secrets.MAILGUN_TO }}
      MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
      MAILGUN_REGION: ${{ secrets.MAILGUN_REGION }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_TO: ${{ secrets.RESEND_TO }}
      RESEND_VERIFIED_DOMAIN: ${{ secrets.RESEND_VERIFIED_DOMAIN }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM: ${{ secrets.SENDGRID_FROM }}
      SENDGRID_TO: ${{ secrets.SENDGRID_TO }}
      LETTERMINT_API_TOKEN: ${{ secrets.LETTERMINT_API_TOKEN }}
      LETTERMINT_FROM: ${{ secrets.LETTERMINT_FROM }}
      LETTERMINT_TO: ${{ secrets.LETTERMINT_TO }}
      MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
      MAILEROO_FROM: ${{ secrets.MAILEROO_FROM }}
      MAILEROO_TO: ${{ secrets.MAILEROO_TO }}
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
      with:
        experimental: true
        cache: true
        cache_key_prefix: mise-v4
    - name: Start Stalwart
      run: docker compose -f packages/jmap/docker-compose.yml up -d
    - name: Setup Stalwart test accounts
      run: ./packages/jmap/scripts/setup-stalwart.sh
    - run: mise run test:deno --coverage --junit-path=junit.xml
    - if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: junit.xml
    - uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage/lcov.info

  test-bun:
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
        - 1025:1025  # SMTP port
        - 8025:8025  # Web interface port
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: "1"
          MP_SMTP_AUTH_ALLOW_INSECURE: "1"
        options: >-
          --health-cmd="wget --quiet --tries=1 --spider http://localhost:8025/api/v1/info"
          --health-interval=30s
          --health-timeout=10s
          --health-retries=3
          --health-start-period=40s
    env:
      MAILPIT_SMTP_HOST: localhost
      MAILPIT_SMTP_PORT: 1025
      MAILPIT_SMTP_SECURE: "false"
      MAILPIT_API_URL: http://localhost:8025
      STALWART_SESSION_URL: http://localhost:8080/jmap/session
      STALWART_USERNAME: test@mail.example.com
      STALWART_PASSWORD: password123
      STALWART_BASE_URL: http://localhost:8080
      MAILGUN_KEY: ${{ secrets.MAILGUN_KEY }}
      MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
      MAILGUN_TO: ${{ secrets.MAILGUN_TO }}
      MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
      MAILGUN_REGION: ${{ secrets.MAILGUN_REGION }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_TO: ${{ secrets.RESEND_TO }}
      RESEND_VERIFIED_DOMAIN: ${{ secrets.RESEND_VERIFIED_DOMAIN }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM: ${{ secrets.SENDGRID_FROM }}
      SENDGRID_TO: ${{ secrets.SENDGRID_TO }}
      LETTERMINT_API_TOKEN: ${{ secrets.LETTERMINT_API_TOKEN }}
      LETTERMINT_FROM: ${{ secrets.LETTERMINT_FROM }}
      LETTERMINT_TO: ${{ secrets.LETTERMINT_TO }}
      MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
      MAILEROO_FROM: ${{ secrets.MAILEROO_FROM }}
      MAILEROO_TO: ${{ secrets.MAILEROO_TO }}
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
      with:
        experimental: true
        cache: true
        cache_key_prefix: mise-v4
    - name: Start Stalwart
      run: docker compose -f packages/jmap/docker-compose.yml up -d
    - name: Setup Stalwart test accounts
      run: ./packages/jmap/scripts/setup-stalwart.sh
    - run: mise run test:bun

  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
      with:
        experimental: true
        cache: true
        cache_key_prefix: mise-v4
    - run: mise run check

  publish:
    if: github.event_name == 'push'
    needs: [test-node, test-deno, test-bun, check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
      with:
        experimental: true
        cache: true
        cache_key_prefix: mise-v4
    - if: github.ref_type == 'tag'
      run: mise run publish:prepare --tag "${{ github.ref_name }}"
    - if: github.ref_type != 'tag'
      run: mise run publish:prepare --dev-build "${{ github.run_number }}" --commit "${{ github.sha }}"
    - if: github.ref_type == 'tag'
      run: mise run publish --tag
      env:
        NPM_CONFIG_PROVENANCE: "true"
    - if: github.ref_type != 'tag'
      run: mise run publish
      env:
        NPM_CONFIG_PROVENANCE: "true"

  public-docs:
    if: github.event_name == 'push'
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
      deployments: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    - uses: jdx/mise-action@v4
      with:
        experimental: true
        cache: true
        cache_key_prefix: mise-v4
    - if: github.ref_type == 'tag'
      run: mise run docs:build
      env:
        EXTRA_NAV_TEXT: Unstable
        EXTRA_NAV_LINK: ${{ vars.UNSTABLE_DOCS_URL }}
        SITEMAP_HOSTNAME: ${{ vars.STABLE_DOCS_URL }}
        JSR_REF_VERSION: stable
        PLAUSIBLE_DOMAIN: ${{ vars.PLAUSIBLE_DOMAIN }}
    - if: github.ref_type != 'tag'
      run: mise run docs:build
      env:
        EXTRA_NAV_TEXT: Stable
        EXTRA_NAV_LINK: ${{ vars.STABLE_DOCS_URL }}
        SITEMAP_HOSTNAME: ${{ vars.UNSTABLE_DOCS_URL }}
        JSR_REF_VERSION: unstable
        PLAUSIBLE_DOMAIN: ${{ vars.PLAUSIBLE_DOMAIN }}
    - uses: actions/upload-pages-artifact@v3
      with:
        path: docs/.vitepress/dist
    - id: deployment
      if: github.ref_type == 'tag'
      uses: actions/deploy-pages@v4
    - if: github.ref_type == 'branch'
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        gitHubToken: ${{ github.token }}
        command: >-
          pages deploy .vitepress/dist
          --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
        packageManager: pnpm
        workingDirectory: ${{ github.workspace }}/docs/
