[env]
_.file = { path = ".env", redact = true }

[tasks.build]
description = "Build @upyo/maileroo"
run = "pnpm exec tsdown"
sources = ["deno.json", "package.json", "tsdown.config.ts", "src/**/*.ts", "../../pnpm-lock.yaml", "../../pnpm-workspace.yaml"]
outputs = ["dist/**/*"]

[tasks."test:deno"]
description = "Run @upyo/maileroo tests with Deno"
usage = '''
flag "--coverage" help="Collect coverage data"
flag "--junit-path <path>" help="Write JUnit XML test output"
'''
run = '''
#!/usr/bin/env nu

let args = ["test", "--allow-env", "--allow-net"]
let args = if ($env.usage_coverage? | default "false" | into bool) {
  $args | append "--coverage=../../coverage/maileroo"
} else {
  $args
}
let args = if ($env.usage_junit_path? | default "" | is-not-empty) {
  $args | append $"--junit-path=($env.usage_junit_path)"
} else {
  $args
}

deno ...$args
'''

[tasks."test:node"]
description = "Run @upyo/maileroo tests with Node.js"
depends = ["build"]
run = "node --network-family-autoselection-attempt-timeout=5000 --experimental-transform-types --test"

[tasks."test:bun"]
description = "Run @upyo/maileroo tests with Bun"
depends = ["build"]
run = "bun test --timeout=90000"

[tasks.test]
description = "Run @upyo/maileroo tests across all runtimes"
depends = ["test:deno", "test:node", "test:bun"]
