[env]
_.file = { path = ".env", redact = true }

[tasks.build]
description = "Build @upyo/jmap"
run = "pnpm exec tsdown"
sources = ["deno.json", "package.json", "tsdown.config.ts", "src/**/*.ts", "../../pnpm-lock.yaml", "../../pnpm-workspace.yaml"]
outputs = ["dist/**/*"]

[tasks."stalwart:up"]
description = "Start Stalwart and configure test accounts"
run = "docker compose up -d && ./scripts/setup-stalwart.sh"

[tasks."stalwart:fresh"]
description = "Recreate Stalwart and configure test accounts"
run = "docker compose down -v && docker compose up -d && sleep 10 && ./scripts/setup-stalwart.sh"

[tasks."stalwart:down"]
description = "Stop Stalwart"
run = "docker compose down"

[tasks."test:deno"]
description = "Run @upyo/jmap tests with Deno"
env.DENO_JOBS = "1"
usage = '''
flag "--coverage" help="Collect coverage data"
flag "--junit-path <path>" help="Write JUnit XML test output"
'''
run = '''
#!/usr/bin/env nu

let args = ["test", "--allow-env", "--allow-net"]
let args = if ($env.usage_coverage? | default "false" | into bool) {
  $args | append "--coverage=../../coverage"
} else {
  $args
}
let args = if ($env.usage_junit_path? | default "" | is-not-empty) {
  $args | append $"--junit-path=($env.usage_junit_path)"
} else {
  $args
}
deno ...$args
'''

[tasks."test:node"]
description = "Run @upyo/jmap tests with Node.js"
depends = ["build"]
run = "node --experimental-transform-types --test"

[tasks."test:bun"]
description = "Run @upyo/jmap tests with Bun"
depends = ["build"]
run = "bun test --timeout=30000"

[tasks.test]
description = "Run @upyo/jmap tests across all runtimes"
depends = ["test:deno", "test:node", "test:bun"]
