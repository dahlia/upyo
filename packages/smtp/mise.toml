[env]
_.file = { path = ".env", redact = true }

[tasks.build]
description = "Build @upyo/smtp"
run = "pnpm exec tsdown"
sources = ["deno.json", "package.json", "tsdown.config.ts", "src/**/*.ts", "../../pnpm-lock.yaml", "../../pnpm-workspace.yaml"]
outputs = ["dist/**/*"]

[tasks."mailpit:start"]
description = "Start Mailpit"
run = "docker run -d --name upyo-mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit:latest"

[tasks."mailpit:stop"]
description = "Stop Mailpit"
run = "docker stop upyo-mailpit && docker rm upyo-mailpit"

[tasks."mailpit:logs"]
description = "Show Mailpit logs"
run = "docker logs upyo-mailpit"

[tasks."dev:mailpit"]
description = "Run Mailpit in the foreground"
interactive = true
run = "docker run --rm -p 1025:1025 -p 8025:8025 axllent/mailpit:latest"

[tasks."test:deno"]
description = "Run @upyo/smtp tests with Deno"
usage = '''
flag "--coverage" help="Collect coverage data"
flag "--junit-path <path>" help="Write JUnit XML test output"
'''
run = '''
#!/usr/bin/env nu

let args = ["test", "--allow-env", "--allow-net"]
let args = if ($env.usage_coverage? | default "false" | into bool) {
  $args | append "--coverage=../../coverage"
} else {
  $args
}
let args = if ($env.usage_junit_path? | default "" | is-not-empty) {
  $args | append $"--junit-path=($env.usage_junit_path)"
} else {
  $args
}
deno ...$args
'''

[tasks."test:node"]
description = "Run @upyo/smtp tests with Node.js"
depends = ["build"]
run = "node --experimental-transform-types --test --test-concurrency=1"

[tasks."test:bun"]
description = "Run @upyo/smtp tests with Bun"
depends = ["build"]
run = "bun test --timeout=30000"

[tasks.test]
description = "Run @upyo/smtp tests across all runtimes"
depends = ["test:deno", "test:node", "test:bun"]
